name: 每日股票分析

on:
  schedule:
    - cron: '0 10 * * 1-5'   # 工作日的北京时间18:00执行（使用默认股票）
  workflow_dispatch:
    inputs:
      stock_list:
        description: '请输入要分析的股票代码（用英文逗号分隔，如 SH.600519,SZ.000858）'
        required: true
        default: 'SH.600519'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
- name: 执行股票分析
  env:
    STOCK_LIST: ${{ github.event.inputs.stock_list || '' }}
    OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    OPENAI_API_BASE: ${{ secrets.OPENAI_API_BASE }}
  run: python main.py
